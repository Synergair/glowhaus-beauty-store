<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | GLOWHAUS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --rose: #8b5a5a;
            --rose-light: #a67c7c;
            --rose-dark: #6b4444;
            --gold: #d4a574;
            --gold-light: #e5c4a8;
            --gold-dark: #b8895a;
            --cream: #faf7f5;
            --cream-dark: #f5f0ec;
            --text-dark: #2c2424;
            --text-muted: #7a6b6b;
            --white: #ffffff;
        }

        body {
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--cream);
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3, h4 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 600;
        }

        /* Header */
        .header {
            background: var(--white);
            padding: 24px 0;
            border-bottom: 1px solid rgba(139, 90, 90, 0.1);
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 32px;
            font-weight: 600;
            color: var(--rose);
            text-decoration: none;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--gold);
        }

        /* Main Content */
        .error-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
            background: linear-gradient(180deg, var(--white) 0%, var(--cream) 100%);
        }

        .error-content {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        /* Large 404 Number */
        .error-number {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 180px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 24px;
            background: linear-gradient(135deg, var(--rose) 0%, var(--gold) 50%, var(--rose-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            letter-spacing: -8px;
        }

        .error-number::after {
            content: '';
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        /* Decorative Elements */
        .decorative-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 32px;
        }

        .decorative-line::before,
        .decorative-line::after {
            content: '';
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold));
        }

        .decorative-line::after {
            background: linear-gradient(90deg, var(--gold), transparent);
        }

        .decorative-diamond {
            width: 8px;
            height: 8px;
            background: var(--gold);
            transform: rotate(45deg);
        }

        /* Error Messages */
        .error-title {
            font-size: 36px;
            color: var(--rose);
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .error-subtitle {
            font-size: 18px;
            color: var(--text-muted);
            margin-bottom: 48px;
            font-weight: 300;
            font-style: italic;
        }

        /* Search Bar */
        .search-container {
            margin-bottom: 48px;
        }

        .search-form {
            display: flex;
            max-width: 480px;
            margin: 0 auto;
            border-radius: 50px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(139, 90, 90, 0.1);
            background: var(--white);
            border: 1px solid rgba(212, 165, 116, 0.3);
        }

        .search-input {
            flex: 1;
            padding: 18px 28px;
            border: none;
            font-size: 14px;
            font-family: 'Montserrat', sans-serif;
            color: var(--text-dark);
            background: transparent;
            outline: none;
        }

        .search-input::placeholder {
            color: var(--text-muted);
            font-weight: 300;
        }

        .search-input:focus {
            outline: none;
        }

        .search-btn {
            padding: 18px 32px;
            background: linear-gradient(135deg, var(--rose) 0%, var(--rose-light) 100%);
            color: var(--white);
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s ease;
            border-radius: 0 50px 50px 0;
        }

        .search-btn:hover {
            background: linear-gradient(135deg, var(--rose-dark) 0%, var(--rose) 100%);
            transform: translateX(2px);
        }

        /* Quick Links */
        .quick-links-title {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .quick-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 48px;
            flex-wrap: wrap;
        }

        .quick-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            background: var(--white);
            border: 1px solid rgba(212, 165, 116, 0.4);
            border-radius: 50px;
            color: var(--rose);
            text-decoration: none;
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .quick-link:hover {
            background: var(--rose);
            color: var(--white);
            border-color: var(--rose);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(139, 90, 90, 0.2);
        }

        .quick-link svg {
            width: 18px;
            height: 18px;
            transition: transform 0.3s ease;
        }

        .quick-link:hover svg {
            transform: scale(1.1);
        }

        /* Return Home Button */
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 18px 40px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: var(--white);
            text-decoration: none;
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(212, 165, 116, 0.3);
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(212, 165, 116, 0.4);
            background: linear-gradient(135deg, var(--gold-dark) 0%, var(--gold) 100%);
        }

        .btn-home svg {
            width: 18px;
            height: 18px;
        }

        /* Elegant Flourish */
        .flourish {
            margin-top: 60px;
            opacity: 0.3;
        }

        .flourish svg {
            width: 120px;
            height: 30px;
            color: var(--gold);
        }

        /* Footer Note */
        .footer-note {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        .footer-note a {
            color: var(--rose);
            text-decoration: none;
        }

        .footer-note a:hover {
            text-decoration: underline;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .error-number {
                font-size: 120px;
                letter-spacing: -4px;
            }

            .error-title {
                font-size: 28px;
            }

            .error-subtitle {
                font-size: 16px;
                margin-bottom: 36px;
            }

            .search-form {
                flex-direction: column;
                border-radius: 24px;
            }

            .search-input {
                padding: 16px 24px;
                text-align: center;
            }

            .search-btn {
                border-radius: 0 0 24px 24px;
                padding: 16px 24px;
            }

            .quick-links {
                flex-direction: column;
                align-items: center;
                gap: 12px;
            }

            .quick-link {
                width: 200px;
                justify-content: center;
            }

            .header-inner {
                padding: 0 16px;
            }

            .logo {
                font-size: 26px;
                letter-spacing: 3px;
            }
        }

        @media (max-width: 480px) {
            .error-number {
                font-size: 90px;
            }

            .error-title {
                font-size: 24px;
            }

            .decorative-line::before,
            .decorative-line::after {
                width: 40px;
            }
        }

        /* Subtle Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-content > * {
            animation: fadeInUp 0.6s ease forwards;
        }

        .error-number { animation-delay: 0.1s; }
        .decorative-line { animation-delay: 0.2s; }
        .error-title { animation-delay: 0.3s; }
        .error-subtitle { animation-delay: 0.4s; }
        .search-container { animation-delay: 0.5s; }
        .quick-links-title { animation-delay: 0.6s; }
        .quick-links { animation-delay: 0.7s; }
        .btn-home { animation-delay: 0.8s; }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="logo">GLOW<span>HAUS</span></a>
        </div>
    </header>

    <!-- 404 Error Section -->
    <section class="error-section">
        <div class="error-content">
            <!-- Large 404 Number -->
            <div class="error-number">404</div>

            <!-- Decorative Line -->
            <div class="decorative-line">
                <span class="decorative-diamond"></span>
            </div>

            <!-- Error Messages -->
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-subtitle">This page is taking a beauty rest</p>

            <!-- Search Bar -->
            <div class="search-container">
                <form class="search-form" action="collection.html" method="get">
                    <input type="text" class="search-input" placeholder="Search for products, skincare tips..." name="q">
                    <button type="submit" class="search-btn">Search</button>
                </form>
            </div>

            <!-- Quick Links -->
            <p class="quick-links-title">Or explore our favorites</p>
            <div class="quick-links">
                <a href="index.html" class="quick-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    Home
                </a>
                <a href="collection.html" class="quick-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <path d="M16 10a4 4 0 0 1-8 0"></path>
                    </svg>
                    Shop
                </a>
                <a href="contact.html" class="quick-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                    Contact
                </a>
            </div>

            <!-- Return Home Button -->
            <a href="index.html" class="btn-home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Return to Homepage
            </a>

            <!-- Elegant Flourish -->
            <div class="flourish">
                <svg viewBox="0 0 120 30" fill="none" stroke="currentColor" stroke-width="1">
                    <path d="M10 15 Q30 5 60 15 Q90 25 110 15" />
                    <circle cx="60" cy="15" r="3" fill="currentColor" stroke="none" />
                </svg>
            </div>
        </div>
    </section>

    <!-- Footer Note -->
    <div class="footer-note">
        <p>Need help? <a href="contact.html">Contact our beauty experts</a></p>
    </div>
</body>
</html>
